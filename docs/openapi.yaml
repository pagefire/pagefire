  # ──────────────────────────── Alerts ────────────────────────────
  /alerts:
    post:
      operationId: createAlert
      tags: [Alerts]
      summary: Create a new alert
      description: Triggers the escalation pipeline for the specified service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRequest"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listAlerts
      tags: [Alerts]
      summary: List alerts with filtering and pagination
      parameters:
        - name: status
          in: query
          description: "Filter by status: triggered, acknowledged, resolved"
          schema:
            type: string
            enum: [triggered, acknowledged, resolved]
        - name: service_id
          in: query
          description: Filter by service ID
          schema:
            type: string
        - name: group_key
          in: query
          description: Filter by group key
          schema:
            type: string
        - name: source
          in: query
          description: "Filter by source: api, integration, monitor, test"
          schema:
            type: string
        - name: search
          in: query
          description: Full-text search in summary (max 200 chars)
          schema:
            type: string
            maxLength: 200
        - name: created_after
          in: query
          description: Filter alerts created after this time (RFC3339)
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Filter alerts created before this time (RFC3339)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of results (default 50, max 200)
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    get:
      operationId: getAlert
      tags: [Alerts]
      summary: Get an alert by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Alert found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
