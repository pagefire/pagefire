openapi: 3.0.3
info:
  title: PageFire API
  version: 0.3.0
  description: |
    PageFire is a unified monitoring and incident management platform.
    Single Go binary, self-hosted, MIT license.

    Authentication is via cookie-based sessions (login endpoint) or
    Bearer API tokens (created via the tokens endpoint). Admin-only
    write operations are enforced on users, teams, services, escalation
    policies, and schedules.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://pagefire.dev

servers:
  - url: /api/v1
    description: Default API base path

tags:
  - name: Health
    description: Health check (no auth required)
  - name: Auth
    description: Authentication, sessions, setup, invites, API tokens
  - name: Users
    description: User management, contact methods, notification rules (admin writes)
  - name: Teams
    description: Team management and membership (admin writes)
  - name: Services
    description: Services, integration keys, routing rules (admin writes)
  - name: Escalation Policies
    description: Escalation policies, steps, and targets (admin writes)
  - name: Schedules
    description: On-call schedules, rotations, participants, overrides (admin writes)
  - name: Alerts
    description: Alert lifecycle — create, acknowledge, resolve, logs
  - name: Incidents
    description: Incident management — create, update, link alerts/services
  - name: On-Call
    description: Resolve who is currently on-call for a schedule
  - name: Integrations
    description: Inbound webhooks (generic, Grafana, Prometheus) — authenticated by integration key
  - name: Schedule Overrides
    description: Schedule overrides accessible to all authenticated users

security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  # ──────────────────────────── Health ────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Health check
      description: Returns server and database health status. No authentication required.
      security: []
      servers:
        - url: /
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: ok
        "503":
          description: Degraded — database unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: degraded
                  db:
                    type: string

  # ──────────────────────────── Auth ────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in with email and password
      description: Creates a server-side session and sets a session cookie. Rate-limited to 10 requests per minute.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Log out and destroy session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/setup:
    get:
      operationId: setupCheck
      tags: [Auth]
      summary: Check if initial setup is required
      description: Returns whether any users exist. If none, setup is required.
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_required:
                    type: boolean
    post:
      operationId: setup
      tags: [Auth]
      summary: Create the first admin user
      description: Only works when no users exist. Creates the first admin and auto-logs in.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: Admin created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/password:
    put:
      operationId: changePassword
      tags: [Auth]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/invite/{token}:
    get:
      operationId: inviteCheck
      tags: [Auth]
      summary: Validate an invite token
      description: Returns the invited user's name and email if the token is valid.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Valid invite
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  email:
                    type: string
        "404":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Invite already used or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: inviteAccept
      tags: [Auth]
      summary: Accept an invite and set password
      description: Sets the invited user's password and auto-logs in.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Password set and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Invalid invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Invite already used or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens:
    post:
      operationId: createAPIToken
      tags: [Auth]
      summary: Create a new API token
      description: Returns the raw token value once. Store it securely — it cannot be retrieved again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Raw token (shown once)
                  id:
                    type: string
                  name:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: listAPITokens
      tags: [Auth]
      summary: List all API tokens for the current user
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/tokens/{id}:
    delete:
      operationId: revokeAPIToken
      tags: [Auth]
      summary: Revoke an API token
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Users ────────────────────────────
  /users:
    post:
      operationId: createUser
      tags: [Users]
      summary: Create a new user (admin only)
      description: |
        If no password is provided, an invite token is generated and returned as invite_url.
        Only admins can set role to "admin".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listUsers
      tags: [Users]
      summary: List all users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [Users]
      summary: Get a user by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateUser
      tags: [Users]
      summary: Update a user (admin only)
      description: Role changes are not allowed via this endpoint; role is preserved from existing record.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags: [Users]
      summary: Delete a user (admin only)
      description: Cannot delete your own account.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/contact-methods:
    get:
      operationId: listContactMethods
      tags: [Users]
      summary: List contact methods for a user
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Contact method list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMethod"
    post:
      operationId: createContactMethod
      tags: [Users]
      summary: Create a contact method for a user (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactMethodRequest"
      responses:
        "201":
          description: Contact method created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMethod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{id}/contact-methods/{cmID}:
    delete:
      operationId: deleteContactMethod
      tags: [Users]
      summary: Delete a contact method (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: cmID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Contact method deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/notification-rules:
    get:
      operationId: listNotificationRules
      tags: [Users]
      summary: List notification rules for a user
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Notification rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationRule"
    post:
      operationId: createNotificationRule
      tags: [Users]
      summary: Create a notification rule for a user (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRuleRequest"
      responses:
        "201":
          description: Notification rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{id}/notification-rules/{ruleID}:
    delete:
      operationId: deleteNotificationRule
      tags: [Users]
      summary: Delete a notification rule (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Notification rule deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Teams ────────────────────────────
  /teams:
    post:
      operationId: createTeam
      tags: [Teams]
      summary: Create a new team (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listTeams
      tags: [Teams]
      summary: List all teams
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [Teams]
      summary: Get a team by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Team found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTeam
      tags: [Teams]
      summary: Update a team (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "200":
          description: Team updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTeam
      tags: [Teams]
      summary: Delete a team (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Team deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{id}/members:
    get:
      operationId: listTeamMembers
      tags: [Teams]
      summary: List members of a team
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: addTeamMember
      tags: [Teams]
      summary: Add a member to a team (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "400":
          $ref: "#/components/responses/BadRequest"

  /teams/{id}/members/{userID}:
    delete:
      operationId: removeTeamMember
      tags: [Teams]
      summary: Remove a member from a team (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: userID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Services ────────────────────────────
  /services:
    post:
      operationId: createService
      tags: [Services]
      summary: Create a new service (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listServices
      tags: [Services]
      summary: List all services
      parameters:
        - name: team_id
          in: query
          description: Filter services by team ID
          schema:
            type: string
      responses:
        "200":
          description: Service list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [Services]
      summary: Get a service by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Service found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateService
      tags: [Services]
      summary: Update a service (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteService
      tags: [Services]
      summary: Delete a service (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Service deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /services/{id}/integration-keys:
    get:
      operationId: listIntegrationKeys
      tags: [Services]
      summary: List integration keys for a service
      description: Secrets are masked in list responses (only a prefix is shown).
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Integration key list (secrets masked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationKeyMasked"
    post:
      operationId: createIntegrationKey
      tags: [Services]
      summary: Create an integration key for a service (admin only)
      description: The full secret is returned only on creation. Store it securely.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationKeyRequest"
      responses:
        "201":
          description: Integration key created (full secret returned once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationKey"
        "400":
          $ref: "#/components/responses/BadRequest"

  /services/{id}/integration-keys/{keyID}:
    delete:
      operationId: deleteIntegrationKey
      tags: [Services]
      summary: Delete an integration key (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: keyID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Integration key deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /services/{id}/integration-keys/{keyID}/test:
    post:
      operationId: testIntegrationKey
      tags: [Services]
      summary: Send a test alert through an integration key (admin only)
      description: Creates a real test alert that flows through the escalation pipeline.
      parameters:
        - $ref: "#/components/parameters/id"
        - name: keyID
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Test alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          $ref: "#/components/responses/NotFound"

  /services/{id}/routing-rules:
    get:
      operationId: listRoutingRules
      tags: [Services]
      summary: List routing rules for a service
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Routing rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutingRule"
    post:
      operationId: createRoutingRule
      tags: [Services]
      summary: Create a routing rule for a service (admin only)
      description: |
        Rules are evaluated in priority order. The first match determines which
        escalation policy is used. If no rule matches, the service's default
        escalation_policy_id is used.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutingRuleRequest"
      responses:
        "201":
          description: Routing rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /services/{id}/routing-rules/{ruleID}:
    delete:
      operationId: deleteRoutingRule
      tags: [Services]
      summary: Delete a routing rule (admin only)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Routing rule deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Escalation Policies ────────────────────────────
  /escalation-policies:
    post:
      operationId: createEscalationPolicy
      tags: [Escalation Policies]
      summary: Create an escalation policy (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEscalationPolicyRequest"
      responses:
        "201":
          description: Escalation policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalationPolicy"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listEscalationPolicies
      tags: [Escalation Policies]
      summary: List all escalation policies
      parameters:
        - name: team_id
          in: query
          description: Filter by team ID
          schema:
            type: string
      responses:
        "200":
          description: Escalation policy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EscalationPolicy"

  /escalation-policies/{id}:
    get:
      operationId: getEscalationPolicy
      tags: [Escalation Policies]
      summary: Get an escalation policy by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Escalation policy found
          content:
            application/json:
              schema:
