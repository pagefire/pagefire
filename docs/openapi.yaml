  /oncall/{scheduleID}:
    get:
      operationId: whosOnCall
      tags: [On-Call]
      summary: Resolve who is on-call for a schedule
      description: Returns the list of users currently on-call, accounting for rotations and overrides.
      parameters:
        - name: scheduleID
          in: path
          required: true
          schema:
            type: string
        - name: at
          in: query
          description: Point in time to resolve (RFC3339). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: On-call users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Integrations ────────────────────────────
  /integrations/{key}/alerts:
    post:
      operationId: genericWebhook
      tags: [Integrations]
      summary: Generic inbound webhook
      description: |
        Accepts alert payloads and creates alerts for the service associated with
        the integration key. Authenticated by the key secret in the URL path.
        Rate-limited to 60 requests per minute.
      security: []
      parameters:
        - name: key
          in: path
          required: true
          description: Integration key secret
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericWebhookRequest"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "200":
          description: Deduplicated — existing alert returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /integrations/{key}/grafana:
    post:
      operationId: grafanaWebhook
      tags: [Integrations]
      summary: Grafana webhook receiver
      description: |
        Accepts Grafana alerting webhook payloads. "ok" state alerts are
        silently acknowledged. Rate-limited to 60 requests per minute.
      security: []
      parameters:
        - name: key
          in: path
          required: true
          description: Integration key secret
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrafanaWebhookRequest"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "200":
          description: Resolved state acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /integrations/{key}/prometheus:
    post:
      operationId: prometheusWebhook
      tags: [Integrations]
      summary: Prometheus Alertmanager webhook receiver
      description: |
        Accepts Prometheus Alertmanager webhook payloads. Resolved alerts are
        skipped. Rate-limited to 60 requests per minute.
      security: []
      parameters:
        - name: key
          in: path
          required: true
          description: Integration key secret
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrometheusWebhookRequest"
      responses:
        "200":
          description: Alerts processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: pagefire_session
      description: Server-side session cookie set by POST /auth/login
    bearerAuth:
      type: http
      scheme: bearer
      description: API token created via POST /auth/tokens

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Users ──
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        timezone:
          type: string
          example: America/New_York
        avatar_url:
          type: string
        auth_provider:
          type: string
          nullable: true
        is_active:
          type: boolean
        last_login:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, email, role, timezone, is_active, created_at]

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        timezone:
          type: string
          default: UTC
        role:
          type: string
          enum: [admin, user]
          default: user
        password:
          type: string
          format: password
          description: If omitted, an invite token is generated instead.

    CreateUserResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        timezone:
          type: string
        invite_url:
          type: string
          description: Present only when no password was provided.

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        timezone:
          type: string
        avatar_url:
          type: string

    # ── API Tokens ──
    APIToken:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        prefix:
          type: string
        created_at:
          type: string
          format: date-time
        last_used:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
      required: [id, user_id, name, prefix, created_at]

    # ── Contact Methods ──
    ContactMethod:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        type:
          type: string
          enum: [email, sms, phone, slack_dm, webhook]
        value:
          type: string
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, user_id, type, value, verified, created_at]

    CreateContactMethodRequest:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [email, sms, phone, slack_dm, webhook]
        value:
          type: string
          description: "Email address, E.164 phone number, Slack user ID, or webhook URL"

    # ── Notification Rules ──
    NotificationRule:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        contact_method_id:
          type: string
        delay_minutes:
          type: integer
          minimum: 0
      required: [id, user_id, contact_method_id, delay_minutes]

    CreateNotificationRuleRequest:
      type: object
      required: [contact_method_id]
      properties:
        contact_method_id:
          type: string
        delay_minutes:
          type: integer
          minimum: 0
          default: 0

    # ── Teams ──
    Team:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, name, created_at]

    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    TeamMember:
      type: object
      properties:
        team_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum: [admin, member]
      required: [team_id, user_id, role]

    AddTeamMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        role:
          type: string
          enum: [admin, member]
          default: member

    # ── Services ──
    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        escalation_policy_id:
          type: string
        team_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, escalation_policy_id, created_at]

    CreateServiceRequest:
      type: object
      required: [name, escalation_policy_id]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        escalation_policy_id:
          type: string
        team_id:
          type: string

    # ── Integration Keys ──
    IntegrationKey:
      type: object
      properties:
        id:
          type: string
        service_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [generic, grafana, prometheus]
        secret:
          type: string
          description: Full secret (only returned on creation)
        created_at:
          type: string
          format: date-time
      required: [id, service_id, name, type, secret, created_at]

    IntegrationKeyMasked:
      type: object
      properties:
        id:
          type: string
        service_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [generic, grafana, prometheus]
        secret_prefix:
          type: string
          description: Masked secret (last 4 chars visible)
        created_at:
          type: string
      required: [id, service_id, name, type, secret_prefix, created_at]

    CreateIntegrationKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [generic, grafana, prometheus]
          default: generic

    # ── Routing Rules ──
    RoutingRule:
      type: object
      properties:
        id:
          type: string
        service_id:
          type: string
        priority:
          type: integer
        condition_field:
          type: string
          enum: [summary, details, source]
        condition_match_type:
          type: string
          enum: [contains, regex]
        condition_value:
          type: string
          maxLength: 200
        escalation_policy_id:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, service_id, priority, condition_field, condition_match_type, condition_value, escalation_policy_id, created_at]

    CreateRoutingRuleRequest:
      type: object
      required: [condition_field, condition_match_type, condition_value, escalation_policy_id]
      properties:
        priority:
          type: integer
        condition_field:
          type: string
          enum: [summary, details, source]
        condition_match_type:
          type: string
          enum: [contains, regex]
        condition_value:
          type: string
          maxLength: 200
        escalation_policy_id:
          type: string

    # ── Escalation Policies ──
    EscalationPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        repeat:
          type: integer
          minimum: 0
          maximum: 5
        team_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, repeat, created_at]

    CreateEscalationPolicyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        repeat:
          type: integer
          minimum: 0
          maximum: 5
          default: 0
        team_id:
          type: string

    EscalationStep:
      type: object
      properties:
        id:
          type: string
        escalation_policy_id:
          type: string
        step_number:
          type: integer
        delay_minutes:
          type: integer
          minimum: 0
      required: [id, escalation_policy_id, step_number, delay_minutes]

    CreateEscalationStepRequest:
      type: object
      properties:
        step_number:
          type: integer
        delay_minutes:
          type: integer
          minimum: 0
          default: 0

    EscalationStepTarget:
      type: object
      properties:
        id:
          type: string
        escalation_step_id:
          type: string
        target_type:
          type: string
          enum: [user, schedule]
        target_id:
          type: string
      required: [id, escalation_step_id, target_type, target_id]

    CreateEscalationStepTargetRequest:
      type: object
      required: [target_type, target_id]
      properties:
        target_type:
          type: string
          enum: [user, schedule]
        target_id:
          type: string

    # ── Schedules ──
    Schedule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        timezone:
          type: string
        team_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, timezone, created_at]

    CreateScheduleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        timezone:
          type: string
          default: UTC
        team_id:
          type: string

    Rotation:
      type: object
      properties:
        id:
          type: string
        schedule_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [daily, weekly, custom]
        shift_length:
          type: integer
          minimum: 1
        start_time:
          type: string
          format: date-time
        handoff_time:
          type: string
          example: "09:00"
        created_at:
          type: string
          format: date-time
      required: [id, schedule_id, name, type, shift_length, start_time, handoff_time, created_at]

    CreateRotationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [daily, weekly, custom]
          default: weekly
        shift_length:
          type: integer
          minimum: 1
          default: 1
        start_time:
          type: string
          format: date-time
        handoff_time:
          type: string
          example: "09:00"

    RotationParticipant:
      type: object
      properties:
        id:
          type: string
        rotation_id:
          type: string
        user_id:
          type: string
        position:
          type: integer
      required: [id, rotation_id, user_id, position]

    CreateRotationParticipantRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        position:
          type: integer

    ScheduleOverride:
      type: object
      properties:
        id:
          type: string
        schedule_id:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        replace_user:
          type: string
        override_user:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, schedule_id, start_time, end_time, replace_user, override_user, created_at]

    CreateScheduleOverrideRequest:
      type: object
      required: [start_time, end_time, replace_user, override_user]
      properties:
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        replace_user:
          type: string
        override_user:
          type: string

    # ── Alerts ──
    Alert:
      type: object
      properties:
        id:
          type: string
        service_id:
          type: string
        status:
          type: string
          enum: [triggered, acknowledged, resolved]
        summary:
          type: string
          maxLength: 500
        details:
          type: string
          maxLength: 10000
        source:
          type: string
          enum: [api, integration, monitor, test]
        dedup_key:
          type: string
        group_key:
          type: string
        escalation_policy_snapshot:
          type: string
          description: JSON-encoded snapshot of the escalation policy at alert creation time
        escalation_step:
          type: integer
        loop_count:
          type: integer
        next_escalation_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by:
          type: string
          nullable: true
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, service_id, status, summary, source, escalation_step, loop_count, created_at]

    CreateAlertRequest:
      type: object
      required: [service_id, summary]
      properties:
        service_id:
          type: string
        summary:
          type: string
          maxLength: 500
        details:
          type: string
          maxLength: 10000
        dedup_key:
          type: string
        group_key:
          type: string

    AlertLog:
      type: object
      properties:
        id:
          type: string
        alert_id:
          type: string
        event:
          type: string
          enum: [created, escalated, acknowledged, resolved]
        message:
          type: string
        user_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, alert_id, event, message, created_at]

    # ── Incidents ──
    Incident:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [triggered, acknowledged, investigating, identified, monitoring, resolved]
        severity:
          type: string
          enum: [critical, major, minor]
        summary:
          type: string
          maxLength: 10000
        source:
          type: string
          enum: [manual, alert, monitor]
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
      required: [id, title, status, severity, source, created_at]

    CreateIncidentRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [triggered, acknowledged, investigating, identified, monitoring, resolved]
          default: triggered
        severity:
          type: string
          enum: [critical, major, minor]
          default: critical
        summary:
          type: string
          maxLength: 10000
        source:
          type: string
          default: manual

    UpdateIncidentRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [triggered, acknowledged, investigating, identified, monitoring, resolved]
        severity:
          type: string
          enum: [critical, major, minor]
        summary:
          type: string
          maxLength: 10000

    IncidentUpdate:
      type: object
      properties:
        id:
          type: string
        incident_id:
          type: string
        status:
          type: string
        message:
          type: string
        created_by:
          type: string
        created_by_name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, incident_id, message, created_at]

    CreateIncidentUpdateRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        status:
          type: string
          enum: [triggered, acknowledged, investigating, identified, monitoring, resolved]
          description: If set, the incident status is also updated to this value.

    # ── Integration Webhooks ──
    GenericWebhookRequest:
      type: object
      required: [summary]
      properties:
        summary:
          type: string
          maxLength: 500
        details:
          type: string
          maxLength: 10000
        dedup_key:
          type: string
        group_key:
          type: string

    GrafanaWebhookRequest:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
        ruleId:
          type: string
        state:
          type: string
          description: '"ok" state alerts are silently resolved'

    PrometheusWebhookRequest:
      type: object
      properties:
        alerts:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
                enum: [firing, resolved]
              labels:
                type: object
                additionalProperties:
                  type: string
              annotations:
                type: object
                additionalProperties:
                  type: string
              fingerprint:
                type: string
